name: Deploy react
on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker build -t ahmedgamil/react-test -f Dockerfile.dev .
      - run: docker run -e CI=true ahmedgamil/react-test npm run test
      
      - run: docker build -t ahmedgamil/multi-client ./microservices/client 
      - run: docker build -t ahmedgamil/multi-nginx  ./microservices/nginx 
      - run: docker build -t ahmedgamil/multi-server ./microservices/server
      - run: docker bulid -t ahmedgamil/multi-worker ./microservices/worker 

      - run: docker push ahmedgamil/multi-client 
      - run: docker push ahmedgamil/multi-nginx 
      - run: docker push ahmedgamil/multi-server 
      - run: docker push ahmedgmail/multi-worker 

